services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: money_map
      POSTGRES_PASSWORD: money_map
      POSTGRES_DB: money_map
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U money_map"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://money_map:money_map@postgres:5432/money_map
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./backend
    command: uv run celery -A app.celery_app worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://money_map:money_map@postgres:5432/money_map
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
